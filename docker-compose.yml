version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: rentacar_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: rentacar_db
    ports:
      - "5432:5432"
    volumes:
      - rentacar_pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: rentacar_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  rentacar_pgdata:
